<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800;900&family=DM+Sans:wght@300;400;500;600&display=swap');

:root {
  --bg: #0a0e1a;
  --bg2: #0f172a;
  --bg3: #1e293b;
  --bg4: #334155;
  --orange: #f97316;
  --orange2: #ea580c;
  --purple: #a78bfa;
  --green: #22c55e;
  --red: #ef4444;
  --yellow: #fbbf24;
  --blue: #60a5fa;
  --text: #f1f5f9;
  --text2: #e2e8f0;
  --text3: #94a3b8;
  --text4: #64748b;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html, body {
  height:100%;
  background: #0032ad;
  color: var(--text2);
  font-family: 'DM Sans', system-ui, sans-serif;
  overflow: hidden;
}

#app {
  display: flex;
  flex-direction: column;
  height: 100%;
  width: 100%;
  position: relative;
}

/* ── HEADER ── */
.header {
  background: #0032ad;
  padding: calc(var(--safe-top) + 14px) 20px 14px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: none;
  flex-shrink: 0;
  z-index: 10;
}
.logo { display:flex; align-items:center; gap:10px; }
.logo-icon { font-size:28px; }
.logo-title { font-family:'Syne',sans-serif; font-size:20px; font-weight:900; letter-spacing:2px; color:var(--text); }
.logo-title span { color:var(--orange); }
.logo-sub { font-size:10px; color:var(--text4); letter-spacing:1px; }
.header-right { display:flex; align-items:center; gap:8px; }
.notif-bell {
  position: relative;
  background: var(--bg3);
  border: none;
  border-radius: 10px;
  width: 38px; height: 38px;
  font-size: 18px;
  cursor: pointer;
  display: flex; align-items:center; justify-content:center;
}
.notif-dot {
  position:absolute; top:4px; right:4px;
  width:10px; height:10px;
  background: var(--red);
  border-radius:50%;
  border: 2px solid var(--bg2);
}

/* ── NOTIFICATION PANEL ── */
.notif-panel {
  position: absolute;
  top: calc(var(--safe-top) + 68px);
  right: 16px;
  left: 16px;
  background: var(--bg2);
  border: 1px solid var(--bg4);
  border-radius: 14px;
  z-index: 100;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,.6);
  display: none;
}
.notif-panel.open { display:block; }
.notif-panel-title { padding:14px 16px 10px; font-size:13px; font-weight:700; color:var(--text3); text-transform:uppercase; letter-spacing:.5px; border-bottom:1px solid var(--bg3); }
.notif-item {
  display: flex; align-items:center; gap:10px;
  padding: 12px 16px;
  border-bottom: 1px solid var(--bg3);
  font-size: 13px;
}
.notif-item:last-child { border-bottom:none; }
.notif-icon { font-size:20px; flex-shrink:0; }
.notif-text { flex:1; }
.notif-type { font-weight:700; font-size:11px; text-transform:uppercase; }
.notif-race { color:var(--text2); }
.notif-days { color:var(--text4); font-size:12px; }

/* ── TABS ── */
.tabs {
  display: flex;
  background: #000000;
  border-top: 1px solid #222;
  padding-bottom: var(--safe-bottom);
  flex-shrink: 0;
  order: 99;
}
.tab-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  padding: 10px 4px 8px;
  background: none;
  border: none;
  cursor: pointer;
  color: var(--text4);
  font-size: 10px;
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  transition: color .2s;
  position: relative;
}
.tab-btn .tab-icon { font-size: 22px; transition: transform .2s; }
.tab-btn.active { color: var(--orange); }
.tab-btn.active .tab-icon { transform: translateY(-2px); }
.tab-btn.active::before {
  content:'';
  position:absolute; top:0; left:20%; right:20%;
  height:2px;
  background:var(--orange);
  border-radius:0 0 4px 4px;
}

/* ── CONTENT ── */
.content {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 16px;
  padding-bottom: 8px;
}
.page { display:none; position:relative; overflow:hidden; }
.page.active { display:block; animation: fadeUp .25s ease; }

@keyframes fadeUp {
  from { opacity:0; transform:translateY(8px); }
  to   { opacity:1; transform:translateY(0); }
}

/* ── KPI CARDS ── */
.kpi-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px; }
@media (min-width: 700px) {
  .kpi-grid { grid-template-columns: repeat(4, 1fr); }
  .content { padding: 20px 32px; }
  .result-card, .race-card, .stats-card, .section { max-width: 100%; }
  .filters { flex-wrap: wrap; }
}
.kpi-card {
  background: linear-gradient(135deg, var(--bg2), #162032);
  border: 1px solid var(--bg3);
  border-radius: 14px;
  padding: 16px 14px;
  text-align: center;
}
.kpi-icon { font-size:24px; margin-bottom:6px; }
.kpi-val { font-family:'Syne',sans-serif; font-size:22px; font-weight:900; color:var(--orange); }
.kpi-label { font-size:11px; color:var(--text4); margin-top:2px; }

/* ── SECTION ── */
.section { background:var(--bg2); border:1px solid var(--bg3); border-radius:14px; margin-bottom:14px; overflow:hidden; }
.section-header { display:flex; justify-content:space-between; align-items:center; padding:14px 16px; border-bottom:1px solid var(--bg3); }
.section-title { font-size:15px; font-weight:700; color:var(--text); }
.btn-add { background:var(--orange); color:white; border:none; border-radius:8px; padding:6px 12px; font-size:13px; font-weight:700; cursor:pointer; font-family:'DM Sans',sans-serif; }

/* ── RACE ROW ── */
.race-row { display:flex; justify-content:space-between; align-items:center; padding:12px 16px; border-bottom:1px solid var(--bg3); cursor:pointer; }
.race-row:last-child { border-bottom:none; }
.race-row:active { background:var(--bg3); }
.rr-left { display:flex; align-items:center; gap:10px; flex:1; min-width:0; }
.rr-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.rr-name { font-size:14px; font-weight:600; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.rr-meta { font-size:12px; color:var(--text4); margin-top:1px; }
.rr-right { text-align:right; flex-shrink:0; margin-left:8px; }
.rr-date { font-size:12px; color:var(--text3); }
.rr-days { font-size:13px; font-weight:700; margin-top:2px; }

/* ── PAGE HEADER ── */
.page-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
.page-title { font-family:'Syne',sans-serif; font-size:20px; font-weight:800; color:var(--text);  }

/* ── FILTERS ── */
.filters { display:flex; gap:6px; overflow-x:auto; margin-bottom:12px; padding-bottom:4px; scrollbar-width:none; }
.filters::-webkit-scrollbar { display:none; }
.filter-btn { background:var(--bg2); border:1px solid var(--bg3); color:var(--text3); border-radius:20px; padding:6px 14px; cursor:pointer; font-size:13px; white-space:nowrap; font-family:'DM Sans',sans-serif; flex-shrink:0; }
.filter-btn.active { background:var(--orange); border-color:var(--orange); color:white; font-weight:700; }

/* ── RESULT CARD ── */
.result-card {
  background: var(--bg2);
  border: 1px solid var(--bg3);
  border-radius: 14px;
  padding: 14px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: border-color .2s;
}
.result-card:active { border-color:var(--orange); }
.rc-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px; }
.rc-name { font-size:15px; font-weight:700; color:var(--text); }
.rc-loc { font-size:12px; color:var(--text4); margin-top:2px; }
.rc-date { font-size:12px; color:var(--text3); text-align:right; }
.rc-type { font-size:11px; color:var(--text4); margin-top:2px; }
.rc-stats { display:flex; gap:0; border-top:1px solid var(--bg3); padding-top:10px; }
.rc-stat { flex:1; text-align:center; }
.rc-stat-val { font-size:15px; font-weight:800; }
.rc-stat-label { font-size:10px; color:var(--text4); margin-top:2px; }
.rc-bottom { display:flex; justify-content:space-between; align-items:center; margin-top:10px; }
.stars { color:var(--yellow); font-size:14px; }
.rc-pos { font-size:12px; color:var(--text3); }

/* ── RACE CARD ── */
.race-card {
  background: var(--bg2);
  border: 2px solid var(--bg3);
  border-radius: 14px;
  padding: 16px;
  margin-bottom:12px;
  cursor:pointer;
}
.race-card:active { opacity:.9; }
.race-card-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
.status-badge { font-size:11px; font-weight:700; padding:4px 10px; border-radius:20px; text-transform:uppercase; letter-spacing:.5px; }
.countdown { font-family:'Syne',sans-serif; font-size:20px; font-weight:900; }
.race-card-title { font-family:'Syne',sans-serif; font-size:17px; font-weight:800; color:var(--text); margin-bottom:6px; }
.race-card-meta { font-size:12px; color:var(--text3); margin-bottom:12px; }
.race-card-stats { display:flex; border-top:1px solid var(--bg3); border-bottom:1px solid var(--bg3); padding:10px 0; margin-bottom:10px; }
.race-stat { flex:1; text-align:center; }
.race-stat-val { font-size:15px; font-weight:800; }
.race-stat-label { font-size:10px; color:var(--text4); margin-top:2px; }
.reg-info { font-size:12px; padding:8px 0; border-bottom:1px solid var(--bg3); margin-bottom:10px; }
.reminder-tags { display:flex; gap:6px; flex-wrap:wrap; }
.reminder-tag { background:var(--bg3); color:var(--text3); font-size:11px; padding:3px 8px; border-radius:12px; }

/* ── STATS ── */
.stats-card { background:var(--bg2); border:1px solid var(--bg3); border-radius:14px; padding:16px; margin-bottom:12px; }
.stats-title { font-size:15px; font-weight:700; color:var(--text); margin-bottom:12px; }
.stat-bar-row { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
.stat-bar-label { width:80px; font-size:12px; color:var(--text3); }
.stat-bar-track { flex:1; height:7px; background:var(--bg3); border-radius:4px; overflow:hidden; }
.stat-bar-fill { height:100%; background:linear-gradient(90deg,var(--orange),var(--purple)); border-radius:4px; transition:width .5s; }
.stat-bar-val { width:20px; font-size:12px; color:var(--text); font-weight:700; }
.record-row { display:flex; align-items:center; gap:12px; padding:10px 0; border-bottom:1px solid var(--bg3); }
.record-row:last-child { border-bottom:none; }
.total-row { display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid var(--bg3); font-size:14px; }
.total-row:last-child { border-bottom:none; }

/* ── MODAL ── */
.modal-overlay {
  position: fixed; inset:0;
  background: rgba(0,0,0,.75);
  backdrop-filter: blur(4px);
  z-index: 200;
  display: none;
  align-items: flex-end;
}
.modal-overlay.open { display:flex; }
.modal {
  background: var(--bg2);
  border: 1px solid var(--bg4);
  border-radius: 20px 20px 0 0;
  padding: 20px;
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  animation: slideUp .25s ease;
  padding-bottom: calc(20px + var(--safe-bottom));
}
@keyframes slideUp {
  from { transform:translateY(100%); }
  to   { transform:translateY(0); }
}
.modal-handle { width:36px; height:4px; background:var(--bg4); border-radius:2px; margin:0 auto 16px; }
.modal-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:20px; }
.modal-title { font-family:'Syne',sans-serif; font-size:20px; font-weight:800; color:var(--text); }
.modal-close { background:var(--bg3); border:none; color:var(--text3); border-radius:8px; width:30px; height:30px; font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; }

/* ── DETAIL GRID ── */
.detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px; }
.detail-item { background:var(--bg3); border-radius:10px; padding:12px; display:flex; align-items:flex-start; gap:8px; }
.detail-item-icon { font-size:18px; }
.detail-item-label { font-size:10px; color:var(--text4); text-transform:uppercase; letter-spacing:.5px; }
.detail-item-val { font-size:14px; font-weight:700; color:var(--text); margin-top:2px; }
.notes-box { background:var(--bg3); border-radius:10px; padding:14px; margin-bottom:12px; }
.notes-label { font-size:11px; color:var(--text4); text-transform:uppercase; letter-spacing:.5px; margin-bottom:6px; }
.tags-row { display:flex; gap:6px; flex-wrap:wrap; margin-top:12px; }
.tag { background:#1e2a3a; color:var(--blue); font-size:12px; padding:4px 10px; border-radius:6px; }
.actions-row { display:flex; gap:8px; margin-top:16px; }
.btn-edit { flex:1; background:var(--bg3); border:1px solid var(--bg4); color:var(--text2); border-radius:10px; padding:12px; font-size:14px; cursor:pointer; font-family:'DM Sans',sans-serif; }
.btn-delete { background:#2d1515; border:1px solid #7f1d1d; color:var(--red); border-radius:10px; padding:12px 16px; font-size:14px; cursor:pointer; font-family:'DM Sans',sans-serif; }

/* ── FORM ── */
.form-group { margin-bottom:14px; }
.form-label { display:block; font-size:12px; color:var(--text3); text-transform:uppercase; letter-spacing:.5px; margin-bottom:6px; }
.form-input {
  width:100%; background:var(--bg3); border:1px solid var(--bg4);
  border-radius:10px; padding:12px; color:var(--text2);
  font-size:15px; font-family:'DM Sans',sans-serif;
  outline:none; -webkit-appearance:none;
}
.form-input:focus { border-color:var(--orange); }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.form-textarea { min-height:80px; resize:vertical; }
.form-range { -webkit-appearance:none; width:100%; height:6px; background:var(--bg3); border-radius:4px; outline:none; }
.form-range::-webkit-slider-thumb { -webkit-appearance:none; width:22px; height:22px; border-radius:50%; background:var(--orange); cursor:pointer; }
.reminder-btns { display:flex; gap:6px; flex-wrap:wrap; }
.rem-btn { background:var(--bg3); border:1px solid var(--bg4); color:var(--text3); border-radius:8px; padding:7px 14px; cursor:pointer; font-size:13px; font-family:'DM Sans',sans-serif; }
.rem-btn.active { background:#1c3a5e; border-color:var(--blue); color:var(--blue); font-weight:700; }
.form-actions { display:flex; gap:10px; margin-top:20px; }
.btn-cancel { flex:1; background:var(--bg3); border:1px solid var(--bg4); color:var(--text3); border-radius:12px; padding:14px; font-size:15px; cursor:pointer; font-family:'DM Sans',sans-serif; }
.btn-save { flex:2; background:linear-gradient(135deg,var(--orange),var(--orange2)); color:white; border:none; border-radius:12px; padding:14px; font-size:15px; font-weight:700; cursor:pointer; font-family:'DM Sans',sans-serif; }

/* ── EMPTY STATE ── */
.empty { text-align:center; padding:30px 20px; color:var(--text4); font-style:italic; font-size:14px; }

/* ── INSTALL BANNER ── */
.install-banner {
  background: linear-gradient(135deg, #1c3a5e, #162032);
  border: 1px solid var(--blue);
  border-radius: 14px;
  padding: 14px 16px;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap:12px;
}
.install-banner-text { flex:1; font-size:13px; color:var(--text2); }
.install-banner-text strong { color:var(--blue); display:block; margin-bottom:2px; }
.install-btn { background:var(--blue); color:#0a0e1a; border:none; border-radius:8px; padding:8px 14px; font-size:13px; font-weight:700; cursor:pointer; white-space:nowrap; }
.install-close { background:none; border:none; color:var(--text4); cursor:pointer; font-size:18px; }

select.form-input option { background: var(--bg2); }

/* ── AUTH SCREEN ── */
#authScreen {
  position: fixed;
  inset: 0;
  background: #0032ad;
  z-index: 1000;
  overflow-y: auto;
}
#authScreen.hidden { display: none; }
.auth-logo { margin-bottom: 0; }
.auth-box {
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.25);
  border-radius: 20px;
  padding: 14px 18px;
  width: 100%;
  max-width: 320px;
  backdrop-filter: blur(10px);
  box-sizing: border-box;
  max-height: 55vh;
  overflow-y: auto;
}
.auth-title {
  font-family: 'Syne', sans-serif;
  font-size: 16px;
  font-weight: 800;
  color: white;
  margin-bottom: 2px;
}
.auth-sub { font-size: 13px; color: rgba(255,255,255,0.7); margin-bottom: 24px; }
.auth-tabs { display: flex; gap: 4px; background: rgba(0,0,0,0.2); border-radius: 10px; padding: 4px; margin-bottom: 12px; }
.auth-tab {
  flex: 1; padding: 8px; border: none; border-radius: 7px;
  background: none; color: rgba(255,255,255,0.6); font-size: 13px; font-weight: 600;
  cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all .2s;
}
.auth-tab.active { background: white; color: #0032ad; box-shadow: 0 1px 4px rgba(0,0,0,.3); }
.auth-error {
  background: rgba(220,38,38,0.2); border: 1px solid rgba(220,38,38,0.5);
  color: #fca5a5; border-radius: 8px;
  padding: 10px 14px; font-size: 13px;
  margin-bottom: 14px; display: none;
}
.auth-error.show { display: block; }
.auth-success {
  background: rgba(22,163,74,0.2); border: 1px solid rgba(22,163,74,0.5);
  color: #86efac; border-radius: 8px;
  padding: 10px 14px; font-size: 13px;
  margin-bottom: 14px; display: none;
}
.auth-success.show { display: block; }
#authScreen .form-label { color: rgba(255,255,255,0.9); }
#authScreen .form-input {
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.3);
  color: white;
}
#authScreen .form-input::placeholder { color: rgba(255,255,255,0.5); }
.auth-forgot {
  text-align: center;
  margin-top: 14px;
  font-size: 13px;
  color: rgba(255,255,255,0.7);
  cursor: pointer;
  text-decoration: underline;
}
.auth-forgot:hover { color: white; }
.btn-auth {
  width: 100%; background: linear-gradient(135deg, var(--orange), var(--orange2));
  color: white; border: none; border-radius: 12px;
  padding: 14px; font-size: 15px; font-weight: 700;
  cursor: pointer; font-family: 'DM Sans', sans-serif;
  margin-top: 8px;
}
.btn-auth:disabled { opacity: .5; cursor: not-allowed; }

/* ── ADMIN PANEL ── */
.admin-badge {
  background: linear-gradient(135deg, #7c3aed, #5b21b6);
  color: white; font-size: 10px; font-weight: 700;
  padding: 2px 8px; border-radius: 20px; letter-spacing: .5px;
}
.admin-card {
  background: var(--bg2); border: 1px solid #5b21b6;
  border-radius: 14px; padding: 16px; margin-bottom: 12px;
}
.admin-stat {
  display: flex; justify-content: space-between;
  align-items: center; padding: 10px 0;
  border-bottom: 1px solid var(--bg3); font-size: 14px;
}
.admin-stat:last-child { border-bottom: none; }
.admin-user-row {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 0; border-bottom: 1px solid var(--bg3); font-size: 13px;
}
.admin-user-row:last-child { border-bottom: none; }
.admin-avatar {
  width: 34px; height: 34px; border-radius: 50%;
  background: linear-gradient(135deg, var(--orange), var(--purple));
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 800; color: white; flex-shrink: 0;
}
#headerUserName { font-size:12px; color:rgba(255,255,255,0.85); margin-right:4px; }
.notif-bell { background:rgba(255,255,255,0.15); border:1px solid rgba(255,255,255,0.2); color:white; }
.btn-logout { background:rgba(255,255,255,0.15); border:1px solid rgba(255,255,255,0.3); color:white; border-radius:8px; padding:6px 12px; font-size:12px; font-weight:600; cursor:pointer; font-family:'DM Sans',sans-serif; }


/* ── MAP ── */
#raceMapContainer {
  margin-top: 10px;
  border-radius: 12px;
  overflow: hidden;
  border: 1px solid var(--bg4);
  position: relative;
  background: var(--bg3);
}
#raceMap {
  height: 230px;
  width: 100%;
  z-index: 1;
}
.leaflet-container {
  background: #1e293b !important;
}
.map-status {
  padding: 14px;
  text-align: center;
  color: var(--text4);
  font-size: 13px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  min-height: 60px;
}
.map-search-row { display: flex; gap: 8px; align-items: flex-end; }
.map-search-row .form-group { flex: 1; margin-bottom: 0; }
.btn-locate {
  background: var(--orange);
  border: none; border-radius: 10px;
  color: white; font-size: 18px;
  width: 46px; height: 46px;
  cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}


/* ── VAGUES DÉCORATIVES ── */
.wave-deco {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  width: 100%;
  pointer-events: none;
  z-index: 0;
}
.wave-deco2 {
  position: absolute;
  top: 0;
  right: 0;
  pointer-events: none;
  z-index: 0;
  opacity: 0.18;
}
#authScreen, .header {
  position: relative;
  overflow: hidden;
}
#authScreen .auth-logo,
#authScreen .auth-box {
  position: relative;
  z-index: 1;
}


.page > *:not(svg) { position:relative; z-index:1; }
</style>
</head>

<script>
// ─── DATA ─────────────────────────────────────────────────────────────────────
let results = [];
let races = [];

let filterType = "tous";
let currentEditId = null;
let currentEditType = null; // 'result' | 'race'
let deferredPrompt = null;

// ─── UTILS ────────────────────────────────────────────────────────────────────
const daysUntil = d => {
  const diff = new Date(d) - new Date(new Date().toDateString());
  return Math.ceil(diff / 86400000);
};

const fmtDate = d => new Date(d).toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'});
const fmtDateShort = d => new Date(d).toLocaleDateString('fr-FR',{day:'2-digit',month:'short'});

const stars = n => '★'.repeat(Math.max(0,n||0)) + '☆'.repeat(5-Math.max(0,n||0));

const typeIcon = {trail:'🏔️',route:'🏙️',piste:'🏟️',vélo:'🚴',natation:'🏊',autre:'🏅'};
const weatherIcon = {ensoleillé:'☀️',nuageux:'⛅',pluvieux:'🌧️',neige:'❄️',venteux:'💨',orageux:'⛈️'};
const statusColor = {inscrit:'#22c55e',envisagé:'#f59e0b',passé:'#6b7280'};
const statusBg = {inscrit:'#052e16',envisagé:'#1c1400',passé:'#111'};

const newId = () => Date.now();

// ─── TABS ─────────────────────────────────────────────────────────────────────
function showTab(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  const page = document.getElementById('page-'+name);
  if(page) { page.classList.add('active'); page.style.display = 'block'; }
  document.getElementById('tab-'+name)?.classList.add('active');
  if(name==='dashboard') renderDashboard();
  if(name==='results')   renderResults();
  if(name==='calendar')  renderCalendar();
  if(name==='stats')     renderStats();
  if(name==='admin')     renderAdmin();
  closeNotifPanel();
}

// ─── NOTIFICATIONS ────────────────────────────────────────────────────────────
function getNotifs() {
  const notifs = [];
  races.forEach(r => {
    const dR = daysUntil(r.date);
    const dReg = daysUntil(r.registrationOpen);
    if(dReg > 0 && dReg <= 14) notifs.push({icon:'📋',type:'Inscriptions',race:r.name,days:dReg,color:'#f59e0b',msg:`Ouverture dans ${dReg} jour${dReg>1?'s':''}`});
    if(dR === 1) notifs.push({icon:'🔔',type:'Demain',race:r.name,days:1,color:'#ef4444',msg:'Course demain !'});
    if(dR === 0) notifs.push({icon:'🏁',type:"Aujourd'hui",race:r.name,days:0,color:'#22c55e',msg:"C'est le jour J !"});
    if(dR > 1 && dR <= 7) notifs.push({icon:'⏱️',type:'Bientôt',race:r.name,days:dR,color:'#a78bfa',msg:`Dans ${dR} jours`});
  });
  return notifs;
}

function renderNotifs() {
  const notifs = getNotifs();
  const dot = document.getElementById('notifDot');
  dot.style.display = notifs.length > 0 ? 'block' : 'none';
  const list = document.getElementById('notifList');
  if(notifs.length === 0) {
    list.innerHTML = '<div class="empty">Aucune alerte pour le moment</div>';
    return;
  }
  list.innerHTML = notifs.map(n => `
    <div class="notif-item">
      <span class="notif-icon">${n.icon}</span>
      <div class="notif-text">
        <div class="notif-type" style="color:${n.color}">${n.type}</div>
        <div class="notif-race">${n.race}</div>
        <div class="notif-days">${n.msg}</div>
      </div>
    </div>
  `).join('');
}

function toggleNotifPanel() {
  const p = document.getElementById('notifPanel');
  p.classList.toggle('open');
}
function closeNotifPanel() {
  document.getElementById('notifPanel').classList.remove('open');
}
document.addEventListener('click', e => {
  if(!e.target.closest('#notifPanel') && !e.target.closest('#notifBtn'))
    closeNotifPanel();
});

// ─── INSTALL BANNER ───────────────────────────────────────────────────────────
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  renderInstallBanner();
});

function renderInstallBanner() {
  const b = document.getElementById('installBanner');
  if(localStorage.getItem('tl_install_dismissed')) { b.innerHTML=''; return; }
  // iOS detection
  const isIOS = /iphone|ipad|ipod/.test(navigator.userAgent.toLowerCase());
  const isStandalone = window.navigator.standalone;
  if(isStandalone) { b.innerHTML=''; return; }

  if(isIOS) {
    b.innerHTML = `
      <div class="install-banner">
        <span style="font-size:28px">📱</span>
        <div class="install-banner-text">
          <strong>Installer Guedem sur ton iPhone</strong>
          Appuie sur <strong>□↑</strong> puis "Sur l'écran d'accueil"
        </div>
        <button class="install-close" onclick="dismissInstall()">✕</button>
      </div>`;
  } else if(deferredPrompt) {
    b.innerHTML = `
      <div class="install-banner">
        <span style="font-size:28px">📱</span>
        <div class="install-banner-text">
          <strong>Installer Guedem</strong>
          Accès rapide depuis ton écran d'accueil
        </div>
        <button class="install-btn" onclick="installApp()">Installer</button>
        <button class="install-close" onclick="dismissInstall()">✕</button>
      </div>`;
  }
}

function installApp() {
  if(deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => { deferredPrompt = null; dismissInstall(); });
  }
}
function dismissInstall() {
  localStorage.setItem('tl_install_dismissed','1');
  document.getElementById('installBanner').innerHTML = '';
}

// ─── LEAFLET MAP ──────────────────────────────────────────────────────────────
let raceMap = null;
let raceMarker = null;
let geocodeTimer = null;

function setMapStatus(msg) {
  const s = document.getElementById('mapStatus');
  const m = document.getElementById('raceMap');
  if(!s || !m) return;
  s.textContent = msg;
  s.style.display = 'flex';
  m.style.display = 'none';
}

function showMapCanvas() {
  const s = document.getElementById('mapStatus');
  const m = document.getElementById('raceMap');
  if(!s || !m) return;
  s.style.display = 'none';
  m.style.display = 'block';
}

function initMap(lat, lng, label) {
  if(!window.L) { setMapStatus('⚠️ Leaflet non chargé — vérifiez votre connexion'); return; }

  showMapCanvas();

  if(!raceMap) {
    raceMap = L.map('raceMap', {
      zoomControl: true,
      attributionControl: true,
      scrollWheelZoom: true
    }).setView([lat, lng], 13);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap',
      maxZoom: 19
    }).addTo(raceMap);

    const icon = L.divIcon({
      html: `<div style="background:#f97316;width:22px;height:22px;border-radius:50%;border:3px solid white;box-shadow:0 2px 8px rgba(0,0,0,.6)"></div>`,
      iconSize: [22, 22],
      iconAnchor: [11, 11],
      className: ''
    });

    raceMarker = L.marker([lat, lng], { icon, draggable: true }).addTo(raceMap);
    raceMarker.on('dragend', () => {
      const p = raceMarker.getLatLng();
      const latEl = document.getElementById('f_lat');
      const lngEl = document.getElementById('f_lng');
      if(latEl) latEl.value = p.lat.toFixed(6);
      if(lngEl) lngEl.value = p.lng.toFixed(6);
    });

  } else {
    raceMap.setView([lat, lng], 13);
    raceMarker.setLatLng([lat, lng]);
  }

  if(label) raceMarker.bindPopup(`<b>${label}</b>`).openPopup();

  const latEl = document.getElementById('f_lat');
  const lngEl = document.getElementById('f_lng');
  if(latEl) latEl.value = lat.toFixed(6);
  if(lngEl) lngEl.value = lng.toFixed(6);

  setTimeout(() => { if(raceMap) raceMap.invalidateSize(); }, 400);
}

function geocodeRace() {
  const locEl = document.getElementById('f_location');
  const cpEl  = document.getElementById('f_postal');
  if(!locEl && !cpEl) return;

  const loc = (locEl?.value || '').trim();
  const cp  = (cpEl?.value  || '').trim();
  const query = [cp, loc].filter(Boolean).join(' ');
  if(!query) return;

  setMapStatus('⏳ Recherche en cours…');

  fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1&accept-language=fr`, {
    headers: { 'Accept': 'application/json' }
  })
  .then(r => { if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
  .then(data => {
    if(data && data.length > 0) {
      const lat = parseFloat(data[0].lat);
      const lon = parseFloat(data[0].lon);
      initMap(lat, lon, loc || data[0].display_name);
    } else {
      setMapStatus('❌ Lieu introuvable — essayez un autre nom');
    }
  })
  .catch(err => {
    console.error('Geocode error:', err);
    setMapStatus('⚠️ Erreur réseau — vérifiez votre connexion internet');
  });
}

function debouncedGeocode() {
  clearTimeout(geocodeTimer);
  geocodeTimer = setTimeout(geocodeRace, 800);
}

  _origCloseForm(e);
  if(raceMap) {

    raceMap = null;
    raceMarker = null;
  }
};

// ── Charger données depuis Firestore ────────────────────────────────────────
async function loadUserData(uid) {
  try {
    // Résultats
    const resSnap = await db.collection('users').doc(uid).collection('results').orderBy('date','desc').get();
    if(!resSnap.empty) {
      results = resSnap.docs.map(d => ({id: d.id, ...d.data()}));
    }
    // Courses
    const raceSnap = await db.collection('users').doc(uid).collection('races').orderBy('date','asc').get();
    if(!raceSnap.empty) {
      races = raceSnap.docs.map(d => ({id: d.id, ...d.data()}));
    }
  } catch(e) { console.error('Erreur chargement données:', e); }
}

// ── Sauvegarder dans Firestore ───────────────────────────────────────────────
const save = async () => {
  if(!currentUser) {
    localStorage.setItem('tl_results', JSON.stringify(results));
    localStorage.setItem('tl_races',   JSON.stringify(races));
    return;
  }
  const uid = currentUser.uid;
  const batch = db.batch();
  // Sauvegarder résultats
  results.forEach(r => {
    const ref = db.collection('users').doc(uid).collection('results').doc(String(r.id));
    batch.set(ref, r);
  });
  // Sauvegarder courses
  races.forEach(r => {
    const ref = db.collection('users').doc(uid).collection('races').doc(String(r.id));
    batch.set(ref, r);
  });
  await batch.commit().catch(e => console.error('Erreur sauvegarde:', e));
};

  document.getElementById('authError').classList.remove('show');

async function handleAuth() {
  const email  = document.getElementById('authEmail').value.trim();
  const pass   = document.getElementById('authPassword').value;
  const prenom = (document.getElementById('authPrenom')?.value || '').trim();
  const nom    = (document.getElementById('authNom')?.value || '').trim();
  const displayName = [prenom, nom].filter(Boolean).join(' ');
  const btn   = document.getElementById('authBtn');
  const errEl = document.getElementById('authError');
  const sucEl = document.getElementById('authSuccess');

  errEl.classList.remove('show');
  sucEl.classList.remove('show');

  if(!email || !pass) { errEl.textContent = '⚠️ Email et mot de passe requis'; errEl.classList.add('show'); return; }
  if(pass.length < 6) { errEl.textContent = '⚠️ Mot de passe minimum 6 caractères'; errEl.classList.add('show'); return; }

  if(!window.firebase || !auth) {
    errEl.textContent = '❌ Firebase non chargé — vérifiez votre connexion internet';
    errEl.classList.add('show');
    return;
  }

  btn.disabled = true;
  btn.textContent = '⏳ Chargement…';

  try {
    if(authMode === 'login') {
      await auth.signInWithEmailAndPassword(email, pass);
    } else {
      const cred = await auth.createUserWithEmailAndPassword(email, pass);
      if(displayName) await cred.user.updateProfile({ displayName });
    }
  } catch(e) {
    btn.disabled = false;
    btn.textContent = authMode === 'login' ? 'Se connecter' : "S'inscrire";
    const msgs = {
      'auth/user-not-found':       '❌ Aucun compte avec cet email',
      'auth/wrong-password':       '❌ Mot de passe incorrect',
      'auth/invalid-credential':   '❌ Email ou mot de passe incorrect',
      'auth/email-already-in-use': '❌ Cet email est déjà utilisé',
      'auth/invalid-email':        '❌ Email invalide',
      'auth/too-many-requests':    '⚠️ Trop de tentatives, réessayez plus tard'
    };
    errEl.textContent = msgs[e.code] || ('❌ Erreur : ' + e.message);
    errEl.classList.add('show');
  }
}

async function handleForgotPassword() {
  const email = document.getElementById('authEmail').value.trim();
  const errEl = document.getElementById('authError');
  const sucEl = document.getElementById('authSuccess');
  errEl.classList.remove('show');
  sucEl.classList.remove('show');
  if(!email) {
    errEl.textContent = '⚠️ Entrez votre email d\'abord';
    errEl.classList.add('show');
    return;
  }
  try {
    await auth.sendPasswordResetEmail(email);
    sucEl.textContent = '✅ Email de réinitialisation envoyé à ' + email;
    sucEl.classList.add('show');
  } catch(e) {
    errEl.textContent = '❌ Email introuvable dans notre système';
    errEl.classList.add('show');
  }
}


  if(confirm('Se déconnecter ?')) {
    await auth.signOut();
    results = []; races = [];
  }
}

      </div>
      <div class="admin-card">
        <div style="font-size:14px;font-weight:700;color:var(--text);margin-bottom:12px">👥 Liste des membres</div>
        ${users.length ? users.map(u => `
          <div class="admin-user-row">
            <div class="admin-avatar">${(u.displayName||u.email||'?')[0].toUpperCase()}</div>
            <div style="flex:1;min-width:0">
              <div style="font-weight:600;color:var(--text)">${u.displayName || '–'}</div>
              <div style="color:var(--text4);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${u.email}</div>
            </div>
            <div style="font-size:11px;color:var(--text4)">${u.lastLogin?.toDate ? u.lastLogin.toDate().toLocaleDateString('fr-FR') : '–'}</div>
          </div>`).join('') : '<div class="empty">Aucun utilisateur</div>'}
      </div>`;
  } catch(e) {
    el.innerHTML = `<div class="empty">❌ Erreur : ${e.message}<br><small>Vérifiez les règles Firestore</small></div>`;
  }
}


// ─── INIT ─────────────────────────────────────────────────────────────────────
renderInstallBanner();

// ─── EVENT LISTENERS GLOBAUX ──────────────────────────────────────────────────
// Attacher les fonctions au scope global window
window.handleAuth = handleAuth;
window.handleForgotPassword = handleForgotPassword;

document.addEventListener('DOMContentLoaded', function() {
  // Bouton connexion/inscription
  var authBtn = document.getElementById('authBtn');
  if(authBtn) authBtn.onclick = handleAuth;
  
  // Mot de passe oublié
  var forgotLink = document.getElementById('forgotLink');
  if(forgotLink) forgotLink.onclick = handleForgotPassword;
  
  // Tab Connexion
  var tabLogin = document.getElementById('tabLogin');
  if(tabLogin) tabLogin.onclick = function(){ 
    authMode = 'login';
    document.getElementById('tabLogin').classList.add('active');
    document.getElementById('tabRegister').classList.remove('active');
    document.getElementById('authNameGroup').style.display = 'none';
    document.getElementById('authBtn').textContent = 'Se connecter';
    document.getElementById('authError').classList.remove('show');
  };
  
  // Tab Inscription
  var tabRegister = document.getElementById('tabRegister');
  if(tabRegister) tabRegister.onclick = function(){ 
    authMode = 'register';
    document.getElementById('tabRegister').classList.add('active');
    document.getElementById('tabLogin').classList.remove('active');
    document.getElementById('authNameGroup').style.display = 'block';
    document.getElementById('authBtn').textContent = "S'inscrire";
    document.getElementById('authError').classList.remove('show');
  };
});

</script>
</body>
</html>
